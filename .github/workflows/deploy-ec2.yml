name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-main
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          EC2_SERVICE_NAME: ${{ secrets.EC2_SERVICE_NAME }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          envs: EC2_SERVICE_NAME
          script_stop: true
          script: |
            set -e

            cd /var/www/html/my_django_project

            # Force working tree to match remote main to avoid deploy blocks
            # caused by local edits on the server.
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            if [ -f "venv/bin/activate" ]; then
              . venv/bin/activate
            elif [ -f ".venv/bin/activate" ]; then
              . .venv/bin/activate
            else
              echo "No virtual environment found (venv/.venv)."
              exit 1
            fi

            pip install -r requirements.txt
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput

            sudo systemctl restart apache2
            sudo systemctl is-active apache2 --quiet