{% extends 'base.html' %}

{% block title %}{{ title }} - Auto Dealer{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <h1>{{ title }}</h1>
        
        <form method="POST" class="mt-4">
            {% csrf_token %}
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="brand" class="form-label">Brand *</label>
                    <input type="text" class="form-control" id="brand" name="brand" 
                        value="{{ auto.brand }}" required>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label for="model" class="form-label">Model *</label>
                    <input type="text" class="form-control" id="model" name="model" 
                        value="{{ auto.model }}" required>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-3 mb-3">
                    <label for="year" class="form-label">Year *</label>
                    <input type="number" class="form-control" id="year" name="year" 
                        value="{{ auto.year }}" required>
                </div>
                
                <div class="col-md-3 mb-3">
                    <label for="price" class="form-label">Price *</label>
                    <input type="number" class="form-control" id="price" name="price" 
                        step="0.01" value="{{ auto.price }}" required>
                </div>
                
                <div class="col-md-3 mb-3">
                    <label for="color" class="form-label">Color *</label>
                    <input type="text" class="form-control" id="color" name="color" 
                        value="{{ auto.color }}" required>
                </div>
                
                <div class="col-md-3 mb-3">
                    <label for="mileage" class="form-label">Mileage (km) *</label>
                    <input type="number" class="form-control" id="mileage" name="mileage" 
                        value="{{ auto.mileage }}" required>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="transmission" class="form-label">Transmission *</label>
                    <select class="form-select" id="transmission" name="transmission" required>
                        <option value="">Select Transmission</option>
                        <option value="manual" {% if auto.transmission == 'manual' %}selected{% endif %}>Manual</option>
                        <option value="automatic" {% if auto.transmission == 'automatic' %}selected{% endif %}>Automatic</option>
                    </select>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label for="fuel_type" class="form-label">Fuel Type *</label>
                    <select class="form-select" id="fuel_type" name="fuel_type" required>
                        <option value="">Select Fuel Type</option>
                        <option value="gasoline" {% if auto.fuel_type == 'gasoline' %}selected{% endif %}>Gasoline</option>
                        <option value="diesel" {% if auto.fuel_type == 'diesel' %}selected{% endif %}>Diesel</option>
                        <option value="electric" {% if auto.fuel_type == 'electric' %}selected{% endif %}>Electric</option>
                        <option value="hybrid" {% if auto.fuel_type == 'hybrid' %}selected{% endif %}>Hybrid</option>
                    </select>
                </div>
            </div>
            
            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="4">{{ auto.description }}</textarea>
            </div>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">{% if auto %}Update Auto{% else %}Add Auto{% endif %}</button>
                <a href="{% url 'myapp:auto-list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
